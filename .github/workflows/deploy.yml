name: CI / Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: write

# Cancel any in-progress run for the same ref
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────
  # Job 1 – Read project metadata
  # ─────────────────────────────────────────────
  meta:
    name: Read project metadata
    runs-on: ubuntu-latest
    outputs:
      project-name: ${{ steps.pkg.outputs.name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract name from package.json
        id: pkg
        run: echo "name=$(node -p "require('./package.json').name")" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────
  # Job 2 – Install & test
  # ─────────────────────────────────────────────
  ci:
    name: Install & test
    runs-on: ubuntu-latest
    needs: meta
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24.11.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # - name: Run tests
      #   run: npm test

  # ─────────────────────────────────────────────
  # Job 3 – Build & deploy (main branch only)
  # ─────────────────────────────────────────────
  build-and-deploy:
    name: Build & deploy – ${{ needs.meta.outputs.project-name }}
    runs-on: ubuntu-latest
    needs: [meta, ci]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 24.11.1
        uses: actions/setup-node@v4
        with:
          node-version: '24.11.1'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        run: npm run build:gh
        env:
          DEPLOY_TARGET: gh-pages
          VITE_APP_NAME: ${{ needs.meta.outputs.project-name }}

      - name: Create 404.html for SPA routing
        # GitHub Pages serves 404.html when a path doesn't match a file.
        # Copying index.html → 404.html lets TanStack Router handle all routes
        # client-side so deep links and page refreshes work correctly.
        run: cp dist/index.html dist/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: gh-pages
          enable_jekyll: false
          commit_message: "deploy: ${{ needs.meta.outputs.project-name }} @ ${{ github.sha }}"
